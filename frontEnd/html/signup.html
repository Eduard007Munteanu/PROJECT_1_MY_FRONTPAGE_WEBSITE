<html>
    <head>
        <Title>Links page</Title>
        <link rel="stylesheet" href="/styles/signup.css">
    </head>
    <body>
        <div class = "vertical-body-signup-allign">
            <div class="signup-box">
                <input class = "signup-username" name="signup-username" type="text" placeholder="Username">

        </div>
    </body>
</html>
