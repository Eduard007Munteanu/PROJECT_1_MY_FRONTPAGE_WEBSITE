<!DOCTYPE html>
<html>
    <head>
        <Title>Links page</Title>
        <link rel="stylesheet" href="/styles/main.css">
    </head>
    <body>
        <div class="vertical-head-body-allign">
            <div class="horizontal-Menu-Option">
                <p class="main-info">Links</p>
                <div class="vertical-change-page">
                    <p class="change-page-text">Change options</p>
                    <select class="change-page-option">Change options
                        <option value="default" selected class="change-page-option-default">-</option>
                        <option value="link" class="change-page-option-link">Links</option>
                        <option value="CV" class="change-page-option-main">CV</option>
                    </select>
                </div> 
            </div>
            <div class="links-content">
                <div class="link-general-options">
                    <button class="insert-link-button">Insert link content</button>
                    <button class="remove-all-button">Remove all</button>
                </div>
                <div class="links">
                    <ul class ="list-links">

                    </ul>
                </div>
            </div>  
        </div>   
        <div class="overlay-insert-link">
            <div class="overlay-object">
                <button class="close-project-data-button">X</button>
                <p>Please insert the following</p>
                <p>Project name: <input type="text" class="project-data" name="project_name"> </p>
                <p>Meta Description: <textarea cols="50" rows="5" class="project-data" name="description"></textarea></p> 
                <p>URL link: <input type="text" class="project-data" name="github_link"></p>
                <p>Actual PDF folder: <input type="file" class="project-data" name="pdf_folder" accept=".pdf"></p> <!--Both zip but no check if video or pdf-->
                <p>Actual project video folder <input type="file" class="project-data" name="video_folder" accept=".mp4"></p>
                
                <button class="send-project-data-button">Send</button>

            </div>
        </div>
        
        

        <script type="module" src="/script/main.js"></script>


    </body>
</html
