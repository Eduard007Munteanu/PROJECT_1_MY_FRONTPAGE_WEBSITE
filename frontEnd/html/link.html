<!DOCTYPE html>
<html>
    <head>
        <Title>Projects page</Title>
        <link rel="stylesheet" href="/styles/main.css">
    </head>
    <body>
        <div class="vertical-head-body-allign">
            <div class="horizontal-Menu-Option">
                <p class="main-info">Personal Projects</p>
                <div class="session-controls"></div>
                <div class="vertical-change-page">
                    <p class="change-page-text">Change options</p>
                    <select class="change-page-option">Change options
                        <option value="Home" class="change-page-option-home">Home</option>
                        <option value="CV" class="change-page-option-main">CV</option>
                        <option value="link" class="change-page-option-link">Personal Projects</option>
                    </select>
                </div> 
            </div>
            <div class="links-content">
                <div class="link-general-options admin-only">
                    <button class="insert-link-button">Insert project content</button>
                    <button class="remove-all-button">Remove all projects</button>
                </div>
                <div class="links">
                    <ul class ="list-links">

                    </ul>
                </div>
            </div>  
        </div>   
        <div class="overlay-insert-link">
            <div class="overlay-object">
                <button class="close-project-data-button">X</button>
                <p>Please insert the following</p>
                <div class="project-field" data-field="project_name">
                    <label>Project name <span class="required-mark">*</span></label>
                    <input type="text" class="project-data" name="project_name">
                </div>
                <div class="project-field" data-field="description">
                    <label>Meta description <span class="required-mark">*</span></label>
                    <textarea cols="50" rows="5" class="project-data" name="description"></textarea>
                </div>
                <div class="project-field" data-field="github_link">
                    <label>GitHub URL</label>
                    <input type="text" class="project-data" name="github_link" placeholder="Optional">
                </div>
                <div class="project-field" data-field="pdf_folder">
                    <label>Project PDF file <span class="required-mark">*</span></label>
                    <input type="file" class="project-data" name="pdf_folder" accept=".pdf">
                </div>
                <div class="project-field" data-field="video_folder">
                    <label>Project video file <span class="required-mark">*</span></label>
                    <input type="file" class="project-data" name="video_folder" accept=".mp4">
                </div>
                
                <button class="send-project-data-button">Create</button>

            </div>
        </div>
        
        

        <script type="module" src="/script/main.js"></script>


    </body>
</html>
