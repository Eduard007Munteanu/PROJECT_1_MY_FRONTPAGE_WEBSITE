<!DOCTYPE html>
<html>
    <head>
        <Title>Home page</Title>
        <link rel="stylesheet" href="/styles/main.css">
    </head>
    <body>
        <div class="vertical-head-body-allign">
            <div class="horizontal-Menu-Option">
                <p class="main-info">Home</p>
                <div class="session-controls"></div>
                <div class="vertical-change-page">
                    <p class="change-page-text">Change options</p>
                    <select class="change-page-option">Change options
                        <option value="Home">Home</option>
                        <option value="CV">CV</option>
                        <option value="link">Personal Projects</option>
                    </select>
                </div> 
            </div>

            <div class="home-content">
                <section class="home-section">
                    <h1>Eduard Munteanu</h1>
                    <p>Computer Science Graduate</p>
                    <p>This site has a public guest view, a CV section, and a personal projects section.</p>
                    <div class="home-actions">
                        <a class="home-action-link" href="/html/CV.html">View CV</a>
                        <a class="home-action-link" href="/html/link.html">Personal Projects</a>
                        <button class="home-action-link home-admin-open-button" type="button">Admin Access</button>
                    </div>
                </section>
            </div>
        </div>

        <div class="overlay-insert-link overlay-admin-access">
            <div class="overlay-object admin-access-object">
                <div class="admin-access-header">
                    <p class="admin-access-mode"></p>
                    <button class="close-admin-data-button" type="button">X</button>
                </div>
                <p>Please insert the following</p>
                <p class="admin-access-status"></p>
                <div class="project-field admin-access-field" data-field="username">
                    <label>Username <span class="required-mark">*</span></label>
                    <input type="text" class="admin-access-username" placeholder="Username">
                </div>
                <div class="project-field admin-access-field" data-field="password">
                    <label>Password <span class="required-mark">*</span></label>
                    <input type="password" class="admin-access-password" placeholder="Password">
                </div>
                <button class="admin-access-button" type="button">Enter Admin</button>
            </div>
        </div>

        <script type="module" src="/script/main.js"></script>
    </body>
</html>
