<!DOCTYPE html>
<html>
    <head>
        <Title>Admin Access page</Title>
        <link rel="stylesheet" href="/styles/main.css">
    </head>
    <body>
        <div class="vertical-head-body-allign">
            <div class="horizontal-Menu-Option">
                <p class="main-info">Admin Access</p>
                <div class="session-controls"></div>
                <div class="vertical-change-page">
                    <p class="change-page-text">Change options</p>
                    <select class="change-page-option">Change options
                        <option value="Home">Home</option>
                        <option value="CV">CV</option>
                        <option value="link">Personal Projects</option>
                        <option value="login">Admin Access</option>
                    </select>
                </div> 
            </div>

            <div class="admin-access-content">
                <section class="home-section admin-access-panel">
                    <h1>Admin Access</h1>
                    <p class="admin-access-mode">Current mode: Guest User</p>
                    <p class="admin-access-status">Enter any username and password to switch to admin mode.</p>
                    <div class="admin-access-fields">
                        <input class="admin-access-username" type="text" placeholder="Username">
                        <input class="admin-access-password" type="password" placeholder="Password">
                    </div>
                    <div class="admin-access-actions">
                        <button class="admin-access-button" type="button">Enter Admin</button>
                        <a class="home-action-link" href="/html/Home.html">Back to Home</a>
                    </div>
                </section>
            </div>
        </div>

        <script type="module" src="/script/main.js"></script>
    </body>
</html>
