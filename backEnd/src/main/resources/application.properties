spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/LinkDatabase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:UrangutanStyle69}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#Allow larger uploads for project media.
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:520MB}


#CORS Configuration
app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

#File storage
file.upload-dir=${FILE_UPLOAD_DIR:upload}
cv.pdf-path=${CV_PDF_PATH:E:/EDUARD_CV (2).pdf}

